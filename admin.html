<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trade Legacy Box Review</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark"></span>
          <span>Trade Legacy Box</span>
      </a>
      <nav>
        <a href="./index.html">Capture</a>
        <button class="link-button" id="export-csv" type="button">Export CSV</button>
        <button class="link-button" id="logout" type="button">Log Out</button>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-hero">
        <p class="eyebrow">Simple review</p>
        <h1>Review saved stories and export them later.</h1>
      </section>

      <section class="admin-grid single">
        <div class="admin-panel">
          <h2>Saved Stories</h2>
          <label class="compact-form">
            <span>Search stories</span>
            <input id="submission-search" type="search" placeholder="Trade, name, question, keyword..." />
          </label>
          <div id="submissions-list" class="admin-list"></div>
        </div>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
